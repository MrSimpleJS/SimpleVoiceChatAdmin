debug: false

voicechat-admin:
  enabled: true
  permissions:
    join: svca.join
    broadcast: svca.broadcast
    mute: svca.mute
    list: svca.list
    info: svca.info
    kick: svca.kick
    move: svca.move
    listen: svca.listen
    spy: svca.spy
    gui: svca.gui
  broadcast:
    group-name: broadcast
    password: server-ip
  cooldown-ms: 1500
  confirm-window-ms: 7000
  storage:
    file: voicechat-admin.db
  auto-unmute:
    check-interval-ticks: 300
  maintenance:
    interval-ticks: 100
  listen:
    notify-group-members: true
  audit-webhook:
    enabled: false
    url: ''
    username: VoiceChat Admin
    avatar-url: ''
    content: ''
    embed:
      enabled: true
      color: 3447003
      colors:
        red: 15548997
        green: 5763719
        blue: 3447003
      title: '%action_label% | %target%'
      description: |
        Moderator: **%actor%**
        Log ID: `%id%`

        %details_pretty%
      footer: VoiceChat Admin
  audit-yaml:
    enabled: true
    file: audit-log.yml
    max-entries: 5000
  localization:
    folder: locales
    default-locale: en
    fallback-locale: en
    use-player-locale: true
  messages:
    only-player: '&cPlayers only.'
    no-permission: '&cYou do not have permission.'
    api-not-available: '&cVoice chat API is not available.'
    connection-error: '&cVoice chat connection not found.'
    api-retrying: '&eVoice chat API is still loading. Please try again shortly.'
    need-group: '&cPlease enter a group name.'
    group-not-found: '&cGroup %group% was not found.'
    group-locked: '&cGroup %group% is locked.'
    joined: '&aJoined group %group%.'
    broadcast-joined: '&aJoined the broadcast group.'
    mute-usage: '&cUsage: /vcmute <player> [minutes] [reason]'
    unmute-usage: '&cUsage: /vcunmute <player>'
    info-usage: '&cUsage: /vcinfo <player>'
    session-usage: '&cUsage: /vcsession <player>'
    kick-usage: '&cUsage: /vckick <player>'
    move-usage: '&cUsage: /vcmove <player> <group>'
    history-usage: '&cUsage: /vchistory <player>'
    case-usage: '&cUsage: /vccase <player>'
    search-usage: '&cUsage: /vcsearch <text>'
    warn-usage: '&cUsage: /vcwarn <player> <reason>'
    notes-usage: '&cUsage: /vcnotes <player> [add|remove|list] [text/index]'
    purge-usage: '&cUsage: /vcpurgehistory <player>'
    export-usage: '&cUsage: /vcexport <player>'
    muteedit-usage: '&cUsage: /vcmuteedit <player> <minutes|keep> [reason]'
    muteall-usage: '&cUsage: /vcmuteall [minutes] [reason]'
    lock-usage: '&cUsage: /%command% <group>'

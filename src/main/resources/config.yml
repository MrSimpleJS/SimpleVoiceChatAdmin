    delete-usage: '&cUsage: /vcdelete <group>'
    pull-usage: '&cUsage: /vcpull <group>'
    disconnect-usage: '&cUsage: /vcdisconnect <player>'
    follow-usage: '&cUsage: /vcfollow <player>'
    forceleave-usage: '&cUsage: /vcforceleave <group>'
    groupinfo-usage: '&cUsage: /vcgroupinfo <group>'
    webhook-usage: '&cUsage: /vcwebhook test'
    listen-usage: '&cUsage: /vclisten <group>'
